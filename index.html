<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Gemini Chatbot</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Segoe UI', sans-serif;
      background: #1e1e2e;
      color: #cdd6f4;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }
    .chat-container {
      width: 620px;
      height: 85vh;
      background: #181825;
      border-radius: 16px;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      box-shadow: 0 8px 32px rgba(0,0,0,0.4);
    }
    .chat-header {
      padding: 16px 20px;
      background: #313244;
      font-size: 1.1rem;
      font-weight: 600;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .reset-btn {
      background: #f38ba8;
      color: #1e1e2e;
      border: none;
      border-radius: 8px;
      padding: 5px 12px;
      cursor: pointer;
      font-size: 0.8rem;
      font-weight: 600;
    }
    #chat-box {
      flex: 1;
      overflow-y: auto;
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .message {
      max-width: 80%;
      padding: 10px 14px;
      border-radius: 12px;
      font-size: 0.95rem;
      line-height: 1.5;
      white-space: pre-wrap;
    }
    .user { background: #89b4fa; color: #1e1e2e; align-self: flex-end; border-bottom-right-radius: 3px; }
    .bot  { background: #313244; color: #cdd6f4; align-self: flex-start; border-bottom-left-radius: 3px; }
    .error { background: #f38ba8; color: #1e1e2e; align-self: flex-start; }
    .thinking { color: #6c7086; font-style: italic; font-size: 0.85rem; align-self: flex-start; }
    .input-area {
      display: flex;
      padding: 12px;
      gap: 10px;
      background: #313244;
    }
    input {
      flex: 1;
      padding: 10px 14px;
      border-radius: 10px;
      border: none;
      background: #45475a;
      color: #cdd6f4;
      font-size: 0.95rem;
      outline: none;
    }
    input::placeholder { color: #6c7086; }
    button#send-btn {
      padding: 10px 20px;
      background: #89b4fa;
      color: #1e1e2e;
      border: none;
      border-radius: 10px;
      font-weight: 700;
      cursor: pointer;
      font-size: 0.95rem;
    }
    button#send-btn:disabled { opacity: 0.5; cursor: not-allowed; }
  </style>
</head>
<body>
  <div class="chat-container">
    <div class="chat-header">
      🤖 Gemini Chatbot
      <button class="reset-btn" onclick="resetChat()">Clear Chat</button>
    </div>
    <div id="chat-box"></div>
    <div class="input-area">
      <input id="user-input" type="text" placeholder="Type your message..." />
      <button id="send-btn" onclick="sendMessage()">Send</button>
    </div>
  </div>

  <script>
    const chatBox = document.getElementById("chat-box");
    const input = document.getElementById("user-input");
    const sendBtn = document.getElementById("send-btn");

    function appendMessage(text, type) {
      const div = document.createElement("div");
      div.className = `message ${type}`;
      div.textContent = text;
      chatBox.appendChild(div);
      chatBox.scrollTop = chatBox.scrollHeight;
      return div;
    }

    async function sendMessage() {
      const message = input.value.trim();
      if (!message) return;

      appendMessage(message, "user");
      input.value = "";
      sendBtn.disabled = true;

      const thinking = appendMessage("Thinking...", "thinking");

      try {
        const res = await fetch("http://localhost:5000/chat", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ message })
        });

        const data = await res.json();
        thinking.remove();

        if (data.error) {
          appendMessage("⚠️ " + data.error, "error");
        } else {
          appendMessage(data.reply, "bot");
        }
      } catch (err) {
        thinking.remove();
        appendMessage("⚠️ Could not connect to backend.", "error");
      }

      sendBtn.disabled = false;
      input.focus();
    }

    async function resetChat() {
      await fetch("http://localhost:5000/reset", { method: "POST" });
      chatBox.innerHTML = "";
      appendMessage("Chat history cleared. Starting fresh!", "thinking");
    }

    input.addEventListener("keypress", e => {
      if (e.key === "Enter") sendMessage();
    });
  </script>
</body>
</html>
